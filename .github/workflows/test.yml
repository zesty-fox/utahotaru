name: Cross-platform tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Linux native libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 libgl1 libegl1 libxkbcommon-x11-0
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ runner.os }}" = "Windows" ]; then pip install -r requirements-winrt.txt; fi
      - name: Check platform boundaries
        run: python scripts/check_platform_boundaries.py
      - name: Run unit tests
        run: python -m pytest tests/unit -q
