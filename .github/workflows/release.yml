name: Stable cross-platform release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable version
        required: true
      candidate_tag:
        description: Candidate Release tag containing all gate inputs
        required: true

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-24.04
    environment: stable-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install release tooling
        run: pip install -r requirements.txt
      - name: Verify source quality
        run: |
          python scripts/check_platform_boundaries.py
          python -m pytest tests/unit tests/integration -q
      - name: Require protected release inputs
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          UPDATE_ED25519_PRIVATE_KEY_B64: ${{ secrets.UPDATE_ED25519_PRIVATE_KEY_B64 }}
          LINUX_GPG_PRIVATE_KEY_B64: ${{ secrets.LINUX_GPG_PRIVATE_KEY_B64 }}
        run: |
          for name in WINDOWS_CERTIFICATE_PFX_BASE64 WINDOWS_CERTIFICATE_PASSWORD APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD UPDATE_ED25519_PRIVATE_KEY_B64 LINUX_GPG_PRIVATE_KEY_B64; do
            test -n "${!name}" || { echo "Missing protected secret: $name"; exit 1; }
          done
      - name: Download collected candidate evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-gate-input
          gh release download "${{ inputs.candidate_tag }}" \
            --dir release-gate-input
      - name: Verify collected stable gate inputs
        run: python scripts/verify_release_gate.py release-gate-input --channel stable
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: SUGv${{ inputs.version }}
          draft: true
          files: release-gate-input/*
