name: Release

# 触发条件：推送 ``SUGv*`` tag（如 ``SUGv0.3.3``）即自动出 Release。
#
# 工作流职责：
#   1) 在 Windows runner 上还原 Python + 依赖
#   2) 先打 Updater.exe，再打主程序，再打 zip
#   3) 从 CHANGELOG.md 抽取对应版本段落
#   4) 创建 GitHub Release 并上传 zip
#
# 如果你只想本地发布，跑 ``python scripts/release.py all X.Y.Z``，不需要本工作流。

on:
  push:
    tags:
      - 'SUGv*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 X.Y.Z（用于本地手动触发）'
        required: true

# 全局 UTF-8：Windows runner 上 Python stdout 默认是 cp1252，会让我们脚本里的
# 中文 print 直接抛 UnicodeEncodeError。这两个环境变量让 Python 在所有子步骤
# 里都用 UTF-8 处理 stdout/stderr/打开文件。
env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: '1'

# 显式声明本工作流需要的最小权限。
# 自 2023 年起，GitHub 新建仓库的默认 GITHUB_TOKEN 是「只读」，``softprops/action-gh-release``
# 创建 Release / 上传 Asset 会被 GitHub API 以 ``403 Resource not accessible by integration``
# 拒绝。这里显式声明 ``contents: write`` 即可解锁。
#
# 备选方案：到仓库 Settings → Actions → General → Workflow permissions 选
# "Read and write permissions"。但当前显式写在工作流里更清楚，避免依赖仓库设置。
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ inputs.version }}"
          } else {
            # tag 形如 refs/tags/SUGv0.3.3
            $tag = "${{ github.ref_name }}"
            $v = $tag -replace '^SUGv', ''
          }
          if ($v -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version: $v"
            exit 1
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "tag=SUGv$v"  >> $env:GITHUB_OUTPUT
          Write-Host "version=$v tag=SUGv$v"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # PyAV 在 Windows runner 上需要 ffmpeg；如果你的 requirements 已经声明 av，
      # pip 会自动拉对应的 wheel；这里就不重复安装 ffmpeg。

      - name: Sync version
        shell: pwsh
        run: |
          $OutputEncoding = [System.Text.UTF8Encoding]::new()
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $v = "${{ steps.ver.outputs.version }}"
          $f = "src/strange_uta_game/__version__.py"
          (Get-Content -LiteralPath $f -Raw) `
            -replace '__version__\s*=\s*"[^"]+"', "__version__ = `"$v`"" `
            | Set-Content -LiteralPath $f -Encoding UTF8
          Get-Content $f | Select-String '__version__'

      - name: Build Updater.exe
        run: python updater_app/build_updater.py

      - name: Build main app
        run: python build.py

      - name: Package zip
        shell: pwsh
        run: |
          $OutputEncoding = [System.Text.UTF8Encoding]::new()
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $v = "${{ steps.ver.outputs.version }}"
          $zip = "dist/StrangeUtaGame-v$v.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist/StrangeUtaGame/*" -DestinationPath $zip -CompressionLevel Optimal
          Get-Item $zip | Format-List Name, Length

      - name: Extract release notes
        shell: pwsh
        run: |
          $OutputEncoding = [System.Text.UTF8Encoding]::new()
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $v = "${{ steps.ver.outputs.version }}"
          python scripts/release.py extract-notes $v -o "dist/release_notes-v$v.md"
          Get-Content "dist/release_notes-v$v.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: v${{ steps.ver.outputs.version }}
          body_path: dist/release_notes-v${{ steps.ver.outputs.version }}.md
          files: |
            dist/StrangeUtaGame-v${{ steps.ver.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
